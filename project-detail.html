<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Detail — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Inline overrides scoped to this page only */
    body { margin: 0; }
    [data-reveal] { opacity: 0; transform: translateY(20px); transition: opacity 0.55s ease, transform 0.55s ease; }
    [data-reveal].visible { opacity: 1; transform: none; }
  </style>
</head>
<body class="detail-page-body">

  <!-- ============================================================
       BACK BAR
  ============================================================ -->
  <header class="detail-back-bar">
    <a href="index.html#projects" class="detail-back-btn" aria-label="Back to portfolio">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back to Projects
    </a>
    <a href="index.html" class="detail-bar-logo">
      <span class="logo-bracket">{</span>LUNA<span class="logo-bracket">}</span>
    </a>
  </header>

  <!-- ============================================================
       MAIN CONTENT — populated by JS
  ============================================================ -->
  <main id="detailMain"></main>

  <!-- ============================================================
       SCRIPT — pulls from shared data
  ============================================================ -->
  <script src="script.js"></script>
  <script>
    (function () {
      const params  = new URLSearchParams(window.location.search);
      const id      = params.get('id');
      const main    = document.getElementById('detailMain');

      // Wait for script.js to expose PORTFOLIO_DATA
      const PROJECTS = window.PORTFOLIO_DATA ? window.PORTFOLIO_DATA.PROJECTS : [];

      const proj = PROJECTS.find(p => p.id === id);

      if (!proj) {
        main.innerHTML = `
          <div class="detail-not-found">
            <h2>Project not found</h2>
            <p>The project you're looking for doesn't exist or may have moved.</p>
            <a href="index.html#projects" class="btn btn-primary" style="margin-top:1rem;">Back to Projects</a>
          </div>`;
        return;
      }

      // Update page title
      document.title = `${proj.title} — Portfolio`;

      // Determine live button visibility
      const liveBtnHtml = (proj.live && proj.live !== '#')
        ? `<a href="${proj.live}" target="_blank" rel="noopener" class="btn btn-primary">
             Live Demo
             <svg width="14" height="14" viewBox="0 0 16 16" fill="none" style="margin-left:0.35rem">
               <path d="M3 13L13 3M13 3H7M13 3V9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
             </svg>
           </a>`
        : '';

      // Screenshot or placeholder
      const screenshotContent = proj.screenshot
        ? `<img src="${proj.screenshot}" alt="${proj.title} screenshot" class="browser-screenshot" loading="eager" onerror="this.outerHTML='<div class=\\'browser-screenshot-placeholder\\'><span>${proj.icon || '🖥️'}</span></div>'" />`
        : `<div class="browser-screenshot-placeholder"><span>🖥️</span></div>`;

      // Build features list
      const featuresHtml = (proj.features && proj.features.length)
        ? `<h3 class="proj-features-title">Key Features</h3>
           <ul class="proj-features-list">
             ${proj.features.map(f => `<li>${f}</li>`).join('')}
           </ul>`
        : '';

      // Long description
      const longDescHtml = proj.longDescription
        ? `<p class="proj-long-desc">${proj.longDescription}</p>`
        : '';

      main.innerHTML = `
        <!-- HERO -->
        <section class="proj-hero">
          <div class="proj-hero-inner" data-reveal>
            <p class="proj-eyebrow">Web Development Project</p>
            <h1 class="proj-hero-title">${proj.title}</h1>
            <p class="proj-hero-desc">${proj.description}</p>
            <div class="proj-hero-actions">
              <a href="${proj.github}" target="_blank" rel="noopener" class="btn btn-ghost">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" style="margin-right:0.4rem">
                  <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.167 6.839 9.49.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.605-3.369-1.34-3.369-1.34-.454-1.154-1.11-1.462-1.11-1.462-.908-.62.069-.607.069-.607 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.741 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
                </svg>
                View on GitHub
              </a>
              ${liveBtnHtml}
            </div>
          </div>

          <!-- BROWSER FRAME PREVIEW -->
          <div class="browser-frame-wrap" data-reveal>
            <div class="browser-frame">
              <div class="browser-chrome">
                <div class="browser-dots">
                  <span class="browser-dot red"></span>
                  <span class="browser-dot yellow"></span>
                  <span class="browser-dot green"></span>
                </div>
                <div class="browser-url-bar">
                  ${proj.live && proj.live !== '#' ? proj.live : 'localhost:3000 — ' + proj.title.toLowerCase().replace(/\s+/g, '-')}
                </div>
              </div>
              ${screenshotContent}
            </div>
          </div>
        </section>

        <!-- DETAIL BODY -->
        <div class="proj-detail-layout">

          <!-- LEFT: Description + Features -->
          <div data-reveal>
            ${longDescHtml}
            ${featuresHtml}
          </div>

          <!-- RIGHT: Sidebar -->
          <aside class="proj-sidebar" data-reveal>

            <!-- Tech Stack -->
            <div class="proj-sidebar-card">
              <p class="proj-sidebar-label">Tech Stack</p>
              <div class="proj-tech-tags">
                ${proj.tags.map(t => `<span class="proj-tech-tag">${t}</span>`).join('')}
              </div>
            </div>

            <!-- Links -->
            <div class="proj-sidebar-card">
              <p class="proj-sidebar-label">Project Links</p>
              <div class="proj-sidebar-links">
                <a href="${proj.github}" target="_blank" rel="noopener" class="proj-sidebar-link">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.167 6.839 9.49.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.605-3.369-1.34-3.369-1.34-.454-1.154-1.11-1.462-1.11-1.462-.908-.62.069-.607.069-.607 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.741 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
                  </svg>
                  GitHub Repository
                </a>
                ${proj.live && proj.live !== '#' ? `
                  <a href="${proj.live}" target="_blank" rel="noopener" class="proj-sidebar-link">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                      <path d="M3 13L13 3M13 3H7M13 3V9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Live Deployment
                  </a>` : ''}
              </div>
            </div>

          </aside>
        </div>
      `;

      // Trigger scroll-reveal on injected elements
      requestAnimationFrame(() => {
        const observer = new IntersectionObserver(
          entries => entries.forEach((entry, i) => {
            if (entry.isIntersecting) {
              setTimeout(() => entry.target.classList.add('visible'), i * 80);
              observer.unobserve(entry.target);
            }
          }),
          { threshold: 0.08 }
        );
        document.querySelectorAll('[data-reveal]').forEach(el => observer.observe(el));
      });

    })();
  </script>
</body>
</html>
